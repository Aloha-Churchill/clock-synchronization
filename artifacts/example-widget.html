<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Lamport Clock Demo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      background: #fafafa;
      color: #111;
      padding: 1rem;
    }

    .nodes {
      display: flex;
      gap: 0.75rem;
      align-items: stretch;
      margin-bottom: 0.75rem;
    }

    .node {
      flex: 1;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 0.75rem;
      text-align: center;
    }

    .node-name {
      font-size: 0.7rem;
      font-weight: 600;
      color: #777;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 0.2rem;
    }

    .clock-val {
      font-size: 2.75rem;
      font-weight: 700;
      color: #111;
      margin: 0.2rem 0 0.5rem;
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }

    .node-btn {
      width: 100%;
      padding: 0.4rem 0.5rem;
      border: 1px solid #ccc;
      background: #fff;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.78rem;
      color: #333;
    }

    .node-btn:hover { background: #f0f0f0; }

    .middle {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 0.5rem;
      min-width: 100px;
    }

    .send-btn {
      padding: 0.4rem 0.5rem;
      border: 1px solid #bbb;
      background: #fff;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.78rem;
      color: #333;
      text-align: center;
    }

    .send-btn:hover { background: #f0f0f0; }

    .footer {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 0.6rem;
    }

    .reset-btn {
      padding: 0.3rem 0.7rem;
      border: 1px solid #ccc;
      background: #fff;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.75rem;
      color: #666;
    }

    .reset-btn:hover { background: #f5f5f5; }

    .rule {
      font-size: 0.75rem;
      color: #888;
      flex: 1;
    }

    .log {
      border: 1px solid #e4e4e4;
      border-radius: 5px;
      background: #fff;
      height: 130px;
      overflow-y: auto;
    }

    .log-header {
      font-size: 0.68rem;
      font-weight: 600;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 0.3rem 0.6rem;
      border-bottom: 1px solid #eee;
    }

    .log-entry {
      padding: 0.22rem 0.6rem;
      border-bottom: 1px solid #f5f5f5;
      font-size: 0.78rem;
      font-family: "SFMono-Regular", Menlo, Monaco, Consolas, monospace;
      color: #444;
    }

    .log-entry:last-child { border-bottom: none; }
    .log-entry.send { color: #1a56db; }
    .log-entry.recv { color: #087443; }
    .log-entry.tick { color: #555; }
    .log-entry.hint { color: #aaa; font-family: inherit; }
  </style>
</head>
<body>
  <div class="nodes">
    <div class="node">
      <div class="node-name">Process A</div>
      <div class="clock-val" id="valA">0</div>
      <button class="node-btn" onclick="tick('A')">Internal event</button>
    </div>
    <div class="middle">
      <button class="send-btn" onclick="send('A','B')">A &rarr; B</button>
      <button class="send-btn" onclick="send('B','A')">B &rarr; A</button>
    </div>
    <div class="node">
      <div class="node-name">Process B</div>
      <div class="clock-val" id="valB">0</div>
      <button class="node-btn" onclick="tick('B')">Internal event</button>
    </div>
  </div>

  <div class="footer">
    <button class="reset-btn" onclick="reset()">Reset</button>
    <span class="rule">Receive rule: C &larr; max(C, t) + 1</span>
  </div>

  <div class="log">
    <div class="log-header">Event log</div>
    <div id="log-entries">
      <div class="log-entry hint">Trigger events above to begin.</div>
    </div>
  </div>

  <script>
    const clocks = { A: 0, B: 0 };

    function update() {
      document.getElementById('valA').textContent = clocks.A;
      document.getElementById('valB').textContent = clocks.B;
    }

    function addLog(msg, cls) {
      const entries = document.getElementById('log-entries');
      const div = document.createElement('div');
      div.className = 'log-entry ' + (cls || '');
      div.textContent = msg;
      entries.insertBefore(div, entries.firstChild);
    }

    function tick(p) {
      clocks[p]++;
      update();
      addLog(p + ': internal event  \u2192  clock[' + p + '] = ' + clocks[p], 'tick');
    }

    function send(from, to) {
      // Step 1: sender increments before sending
      clocks[from]++;
      const t = clocks[from];
      // Step 2: receiver applies max rule
      const prevTo = clocks[to];
      clocks[to] = Math.max(clocks[to], t) + 1;
      update();
      addLog(
        from + '\u2192' + to + ':  ' +
        from + ' sends t=' + t + '  |  ' +
        to + ': max(' + prevTo + ', ' + t + ')+1 = ' + clocks[to],
        'recv'
      );
    }

    function reset() {
      clocks.A = 0;
      clocks.B = 0;
      update();
      document.getElementById('log-entries').innerHTML =
        '<div class="log-entry hint">Reset.</div>';
    }
  </script>
</body>
</html>
