<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>History of Timekeeping</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Source+Sans+3:wght@300;400;500;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --parchment: #faf6f0;
    --ink: #2c2418;
    --ink-light: #6b5d4d;
    --ink-faint: #a89a88;
    --sepia: #d4c5a9;
    --sepia-dark: #b8a786;
    --accent: #c0512d;
    --accent-glow: #e8714d;
    --utc-blue: #1a5276;
    --utc-blue-light: #d6eaf8;
    --card-bg: #f5f0e6;
    --font-display: 'Playfair Display', Georgia, serif;
    --font-body: 'Source Sans 3', 'Helvetica Neue', sans-serif;
  }

  body {
    font-family: var(--font-body);
    background: var(--parchment);
    color: var(--ink);
    min-height: 100vh;
    overflow-x: hidden;
  }

  .page {
    max-width: 900px;
    margin: 0 auto;
    padding: 40px 24px 60px;
  }

  h1 {
    font-family: var(--font-display);
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin-bottom: 6px;
  }
  .subtitle {
    font-size: 14px;
    color: var(--ink-light);
    font-weight: 300;
    margin-bottom: 40px;
  }

  /* ── Timeline track ── */
  .timeline {
    position: relative;
    padding: 0 0 0 0;
  }

  .track {
    position: relative;
    display: flex;
    align-items: flex-start;
    gap: 0;
    padding-bottom: 24px;
  }

  .track::before {
    content: '';
    position: absolute;
    top: 64px;
    left: 40px;
    right: 40px;
    height: 2px;
    background: linear-gradient(90deg, var(--sepia) 0%, var(--sepia-dark) 50%, var(--sepia) 100%);
  }

  .node {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    cursor: pointer;
    position: relative;
    z-index: 1;
  }

  .node-icon {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: var(--card-bg);
    border: 2px solid var(--sepia);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s ease;
    position: relative;
  }
  .node:hover .node-icon {
    border-color: var(--accent);
    box-shadow: 0 0 0 4px rgba(192, 81, 45, 0.1);
    transform: translateY(-2px);
  }
  .node.active .node-icon {
    border-color: var(--accent);
    background: #fff;
    box-shadow: 0 0 0 4px rgba(192, 81, 45, 0.15), 0 4px 16px rgba(0,0,0,0.08);
    transform: translateY(-3px);
  }
  .node.utc .node-icon {
    border-color: var(--utc-blue);
  }
  .node.utc:hover .node-icon,
  .node.utc.active .node-icon {
    border-color: var(--utc-blue);
    box-shadow: 0 0 0 4px rgba(26, 82, 118, 0.15), 0 4px 16px rgba(0,0,0,0.08);
  }

  .node-icon svg {
    width: 40px;
    height: 40px;
  }

  .node-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--sepia-dark);
    margin: 8px 0 10px;
    transition: background 0.2s;
  }
  .node:hover .node-dot,
  .node.active .node-dot { background: var(--accent); }
  .node.utc .node-dot { background: var(--utc-blue); }

  .node-year {
    font-family: var(--font-display);
    font-size: 13px;
    font-weight: 700;
    color: var(--ink-light);
    margin-bottom: 4px;
  }
  .node-label {
    font-size: 12px;
    color: var(--ink-faint);
    text-align: center;
    font-weight: 500;
    line-height: 1.3;
    max-width: 90px;
  }
  .node.active .node-year { color: var(--accent); }
  .node.utc.active .node-year { color: var(--utc-blue); }
  .node.active .node-label { color: var(--ink); }

  .utc-badge {
    position: absolute;
    top: -8px;
    right: -8px;
    background: var(--utc-blue);
    color: #fff;
    font-size: 8px;
    font-weight: 600;
    letter-spacing: 0.05em;
    padding: 2px 5px;
    border-radius: 3px;
    text-transform: uppercase;
  }

  /* ── Detail panel ── */
  .detail-panel {
    margin-top: 16px;
    background: #fff;
    border: 1px solid var(--sepia);
    border-radius: 10px;
    overflow: hidden;
    max-height: 0;
    opacity: 0;
    transition: max-height 0.4s ease, opacity 0.3s ease, margin 0.3s ease;
  }
  .detail-panel.open {
    max-height: 500px;
    opacity: 1;
    margin-top: 24px;
  }

  .detail-inner {
    display: flex;
    gap: 0;
  }

  .detail-illustration {
    width: 220px;
    min-height: 200px;
    flex-shrink: 0;
    background: var(--card-bg);
    display: flex;
    align-items: center;
    justify-content: center;
    border-right: 1px solid var(--sepia);
  }
  .detail-illustration svg {
    width: 140px;
    height: 140px;
  }

  .detail-text {
    flex: 1;
    padding: 28px 28px 24px;
  }
  .detail-text h2 {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .detail-text .era {
    font-size: 13px;
    color: var(--ink-faint);
    font-weight: 500;
    margin-bottom: 16px;
  }
  .detail-text .blurb {
    font-size: 14px;
    line-height: 1.65;
    color: var(--ink-light);
    font-weight: 400;
  }
  .detail-text .blurb p + p {
    margin-top: 10px;
  }

  .detail-close {
    position: absolute;
    top: 12px;
    right: 14px;
    border: none;
    background: none;
    font-size: 18px;
    color: var(--ink-faint);
    cursor: pointer;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
  }
  .detail-close:hover { background: var(--card-bg); color: var(--ink); }

  .panel-wrapper {
    position: relative;
  }

  /* ── Pointer triangle ── */
  .pointer {
    position: absolute;
    top: -10px;
    width: 20px;
    height: 10px;
    transition: left 0.3s ease;
    display: none;
  }
  .detail-panel.open + .pointer-track .pointer,
  .pointer.visible { display: block; }

  .instruction {
    text-align: center;
    font-size: 13px;
    color: var(--ink-faint);
    margin-top: 20px;
    font-style: italic;
  }
  .instruction.hidden { display: none; }

  @media (max-width: 600px) {
    .node-icon { width: 60px; height: 60px; }
    .node-icon svg { width: 30px; height: 30px; }
    .track::before { top: 50px; }
    .detail-inner { flex-direction: column; }
    .detail-illustration {
      width: 100%;
      min-height: 120px;
      border-right: none;
      border-bottom: 1px solid var(--sepia);
    }
  }
</style>
</head>
<body>
<div class="page">
  <h1>A Brief History of Timekeeping</h1>
  <p class="subtitle">From shadows to atoms — click each milestone to explore</p>

  <div class="timeline">
    <div class="track" id="track">
      <!-- Nodes injected by JS -->
    </div>

    <div class="panel-wrapper">
      <div class="detail-panel" id="detail-panel">
        <button class="detail-close" onclick="closePanel()" aria-label="Close">×</button>
        <div class="detail-inner">
          <div class="detail-illustration" id="detail-illus"></div>
          <div class="detail-text">
            <h2 id="detail-title"></h2>
            <div class="era" id="detail-era"></div>
            <div class="blurb" id="detail-blurb"></div>
          </div>
        </div>
      </div>
    </div>

    <p class="instruction" id="instruction">Click a milestone above to learn more</p>
  </div>
</div>

const track = document.getElementById('track');
const panel = document.getElementById('detail-panel');
const instruction = document.getElementById('instruction');
let activeId = null;

// Build nodes
items.forEach((item, i) => {
  const node = document.createElement('div');
  node.className = 'node' + (item.utc ? ' utc' : '');
  node.dataset.id = item.id;
  node.onclick = () => toggleItem(item.id);

  node.innerHTML = `
    <div class="node-icon">
      ${item.iconSmall}
      ${item.utc ? '<span class="utc-badge">UTC</span>' : ''}
    </div>
    <div class="node-dot"></div>
    <div class="node-year">${item.year}</div>
    <div class="node-label">${item.label}</div>
  `;
  track.appendChild(node);
});

function toggleItem(id) {
  if (activeId === id) {
    closePanel();
    return;
  }

  activeId = id;
  const item = items.find(i => i.id === id);

  // Update active node
  document.querySelectorAll('.node').forEach(n => n.classList.remove('active'));
  document.querySelector(`.node[data-id="${id}"]`).classList.add('active');

  // Fill panel
  document.getElementById('detail-title').textContent = item.label;
  document.getElementById('detail-era').textContent = item.era;
  document.getElementById('detail-blurb').innerHTML = item.blurb;
  document.getElementById('detail-illus').innerHTML = item.iconLarge;

  panel.classList.add('open');
  instruction.classList.add('hidden');
}

function closePanel() {
  activeId = null;
  panel.classList.remove('open');
  document.querySelectorAll('.node').forEach(n => n.classList.remove('active'));
  instruction.classList.remove('hidden');
}
</script>
</body>
</html>
