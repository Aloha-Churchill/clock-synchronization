<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Real Sun vs Mean Sun</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Source+Sans+3:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --fg: #2c2418;
    --fg-dim: #6b5d4d;
    --fg-faint: #a89a88;
    --bg: #fdfbfc;
    --bg-sub: #faf7f9;
    --border: #d4c5a9;
    --sun-gold: #e6a817;
    --sun-glow: #fff3d4;
    --mean-sun: #5b4fc7;
    --earth-blue: #1a5276;
    --orbit-line: #b8a786;
    --font-serif: 'Playfair Display', Georgia, serif;
    --font-sans: 'Source Sans 3', 'Helvetica Neue', sans-serif;
    --font-mono: 'IBM Plex Mono', monospace;
  }

  body {
    font-family: var(--font-sans);
    color: var(--fg);
    background: var(--bg);
    line-height: 1.55;
  }

  .container {
    max-width: 760px;
    margin: 0 auto;
    padding: 28px 20px 40px;
  }

  h1 {
    font-family: var(--font-serif);
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 8px;
  }

  .intro {
    font-size: 14px;
    color: var(--fg-dim);
    margin-bottom: 24px;
    max-width: 640px;
    line-height: 1.65;
  }

  .main-section {
    background: var(--bg-sub);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 22px;
  }

  .main-section h2 {
    font-family: var(--font-serif);
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 14px;
  }

  /* ── Legend ── */
  .legend {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 13px;
    color: var(--fg-dim);
  }
  .leg-real {
    width: 12px; height: 12px; border-radius: 50%;
    background: var(--sun-gold);
  }
  .leg-mean {
    width: 12px; height: 12px; border-radius: 50%;
    border: 2px dashed var(--mean-sun);
  }
  .leg-earth {
    width: 12px; height: 12px; border-radius: 50%;
    background: var(--earth-blue);
  }

  /* ── Orbit SVG ── */
  #orbit-svg {
    display: block;
    width: 100%;
  }

  /* ── Stats row ── */
  .stats-row {
    display: flex;
    gap: 0;
    flex-wrap: wrap;
    margin-top: 18px;
    padding-top: 18px;
    border-top: 1px solid var(--border);
  }
  .stat {
    flex: 1;
    min-width: 150px;
    padding: 0 16px 0 0;
  }
  .stat:last-child { padding-right: 0; }
  .stat-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--fg-faint);
    font-weight: 600;
    margin-bottom: 3px;
  }
  .stat-val {
    font-family: var(--font-mono);
    font-size: 17px;
    font-weight: 500;
  }
  .stat-sub {
    font-size: 12px;
    color: var(--fg-dim);
    margin-top: 2px;
    line-height: 1.4;
  }
  .ahead { color: #c0512d; }
  .behind { color: #2471a3; }
  .same { color: var(--fg-faint); }

  /* ── Slider ── */
  .slider-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 18px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }
  .slider-row label {
    font-size: 12px;
    font-weight: 600;
    color: var(--fg-dim);
    white-space: nowrap;
  }
  .slider-row input[type=range] {
    flex: 1;
    accent-color: var(--earth-blue);
  }
  .slider-val {
    font-family: var(--font-mono);
    font-size: 13px;
    min-width: 56px;
    text-align: right;
  }
</style>
</head>
<body>
<div class="container">

  <div class="main-section">
    <h2>Earth's orbit — top view (eccentricity exaggerated)</h2>

    <div class="legend">
      <div class="legend-item"><div class="leg-real"></div>Real Sun</div>
      <div class="legend-item"><div class="leg-mean"></div>Mean Sun (uniform speed)</div>
      <div class="legend-item"><div class="leg-earth"></div>Earth</div>
    </div>

    <svg id="orbit-svg" viewBox="0 0 680 520"></svg>

    <div class="stats-row">
      <div class="stat">
        <div class="stat-label">Date</div>
        <div class="stat-val" id="stat-date">Jan 1</div>
      </div>
      <div class="stat">
        <div class="stat-label">Real Sun</div>
        <div class="stat-val" id="stat-gap">—</div>
        <div class="stat-sub" id="stat-gap-desc">—</div>
      </div>
      <div class="stat">
        <div class="stat-label">Earth–Sun distance</div>
        <div class="stat-val" id="stat-dist">—</div>
        <div class="stat-sub" id="stat-dist-desc">—</div>
      </div>
    </div>

    <div class="slider-row">
      <label>Day of year</label>
      <input type="range" id="day-slider" min="0" max="364" value="0">
      <span class="slider-val" id="day-label">Jan&nbsp;1</span>
    </div>
  </div>

</div>
<script>
// ── Constants ──
const DEG = Math.PI / 180;
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const MONTH_DAYS = [31,28,31,30,31,30,31,31,30,31,30,31];

// Cumulative day at start of each month
const MONTH_START = MONTH_DAYS.reduce((acc, d, i) => {
  acc.push(i === 0 ? 0 : acc[i-1] + MONTH_DAYS[i-1]);
  return acc;
}, []);

// Day → "Jan 3" string
function dayToStr(d) {
  let rem = Math.round(d) % 365;
  if (rem < 0) rem += 365;
  for (let m = 0; m < 12; m++) {
    if (rem < MONTH_DAYS[m]) return `${MONTHS[m]}\u00a0${rem + 1}`;
    rem -= MONTH_DAYS[m];
  }
  return 'Dec\u00a031';
}

// Equation of time (minutes) — Spencer approximation
// Positive = real sun ahead of mean sun
function eotMinutes(D) {
  const B = (2 * Math.PI / 365.24) * (D - 81);
  return 9.87 * Math.sin(2 * B) - 7.53 * Math.cos(B) - 1.5 * Math.sin(B);
}

// Earth–Sun distance (AU), perihelion ~Jan 3
function earthSunAU(D) {
  const M = (2 * Math.PI * (D - 3)) / 365.25;
  return 1 - 0.0167 * Math.cos(M);
}

// ── Orbit geometry ──
// viewBox 0 0 680 520
const OCX = 340, OCY = 255;   // ellipse center
const OA = 210, OB = 193;     // visual semi-major, semi-minor
const OE = 0.28;               // exaggerated eccentricity for visibility
const FOCUS = OA * OE;         // focus offset from center
const SUN_X = OCX - FOCUS;     // Sun at left focus
const SUN_Y = OCY;

// True anomaly (radians) from mean anomaly — first-order Kepler
function trueAnomaly(M_rad) {
  const e = OE;
  return M_rad + 2 * e * Math.sin(M_rad) + 1.25 * e * e * Math.sin(2 * M_rad);
}

// Earth's position on the ellipse for day D (perihelion = day 3)
function earthPos(D) {
  const M = (2 * Math.PI * (D - 3)) / 365.25;
  const nu = trueAnomaly(M); // true anomaly
  // r in visual units (ellipse, focus = Sun)
  const r = OA * (1 - OE * OE) / (1 + OE * Math.cos(nu));
  // perihelion is to the LEFT of the sun in this diagram
  // nu=0 → perihelion → angle = π (leftward from sun)
  const angle = nu + Math.PI;
  return {
    x: SUN_X + r * Math.cos(angle),
    y: SUN_Y - r * Math.sin(angle),
    nu, M
  };
}

// Mean Earth: uniform circular motion centered at the Sun, radius = OA
function meanPos(D) {
  const M = (2 * Math.PI * (D - 3)) / 365.25;
  const angle = M + Math.PI; // same starting point as real Earth
  return {
    x: SUN_X + OA * Math.cos(angle),
    y: SUN_Y - OA * Math.sin(angle)
  };
}

// ── Draw static orbit background ──
function drawOrbitBG() {
  const svg = document.getElementById('orbit-svg');
  let html = '';

  // Space background
  html += `<rect width="680" height="520" fill="#0d1117" rx="8"/>`;

  // Faint radial lines from sun for reference
  for (let i = 0; i < 12; i++) {
    const a = (i / 12) * 2 * Math.PI;
    const x2 = SUN_X + 300 * Math.cos(a);
    const y2 = SUN_Y - 300 * Math.sin(a);
    html += `<line x1="${SUN_X}" y1="${SUN_Y}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}"
      stroke="white" stroke-width="0.4" opacity="0.06"/>`;
  }

  // Mean sun circle (uniform orbit)
  html += `<circle cx="${SUN_X}" cy="${SUN_Y}" r="${OA}"
    fill="none" stroke="var(--mean-sun)" stroke-width="1" stroke-dasharray="5 4" opacity="0.35"/>`;

  // Real orbit ellipse
  html += `<ellipse cx="${OCX}" cy="${OCY}" rx="${OA}" ry="${OB}"
    fill="none" stroke="var(--orbit-line)" stroke-width="1.5" opacity="0.6"/>`;

  // Month markers on the real orbit
  for (let m = 0; m < 12; m++) {
    const D = MONTH_START[m];
    const pt = earthPos(D);
    // Direction from sun to marker for tick
    const dx = pt.x - SUN_X, dy = pt.y - SUN_Y;
    const len = Math.sqrt(dx*dx + dy*dy);
    const nx = dx/len, ny = dy/len;
    const tx1 = pt.x, ty1 = pt.y;
    const tx2 = pt.x + nx*7, ty2 = pt.y + ny*7;
    html += `<line x1="${tx1.toFixed(1)}" y1="${ty1.toFixed(1)}" x2="${tx2.toFixed(1)}" y2="${ty2.toFixed(1)}"
      stroke="var(--orbit-line)" stroke-width="1.2" opacity="0.5"/>`;
    // Label offset further out
    const lx = pt.x + nx * 18, ly = pt.y + ny * 18;
    html += `<text x="${lx.toFixed(1)}" y="${ly.toFixed(1)}" text-anchor="middle"
      dominant-baseline="middle" font-size="10" fill="#c8b89a" opacity="0.75"
      font-family="var(--font-sans)">${MONTHS[m]}</text>`;
  }

  // Perihelion / Aphelion labels
  const periX = SUN_X - OA * (1 - OE*OE) / (1 + OE);
  const apeX  = SUN_X + OA * (1 - OE*OE) / (1 - OE);

  html += `<text x="${(periX - 14).toFixed(1)}" y="${(SUN_Y + 22).toFixed(1)}" text-anchor="middle"
    font-size="9.5" fill="#888" font-family="var(--font-sans)">Perihelion</text>`;
  html += `<text x="${(apeX + 14).toFixed(1)}" y="${(SUN_Y + 22).toFixed(1)}" text-anchor="middle"
    font-size="9.5" fill="#888" font-family="var(--font-sans)">Aphelion</text>`;

  // Sun
  html += `<circle cx="${SUN_X}" cy="${SUN_Y}" r="22" fill="#3d2a00" opacity="0.8"/>`;
  html += `<circle cx="${SUN_X}" cy="${SUN_Y}" r="16" fill="#e6a817"/>`;
  html += `<text x="${SUN_X}" y="${SUN_Y + 30}" text-anchor="middle"
    font-size="11" fill="var(--sun-gold)" font-weight="600" font-family="var(--font-sans)">Sun</text>`;

  // Dynamic layer
  html += `<g id="orbit-dyn"></g>`;

  svg.innerHTML = html;
}

// ── Update orbit dynamic layer ──
function updateOrbit(D) {
  const ep = earthPos(D);
  const mp = meanPos(D);

  let html = '';

  // Angular wedge between real and mean Earth as seen from the Sun
  const angleReal = Math.atan2(SUN_Y - ep.y, ep.x - SUN_X);
  const angleMean = Math.atan2(SUN_Y - mp.y, mp.x - SUN_X);

  // Draw the wedge (shaded sector)
  const wedgeR = 55;
  const ax1 = SUN_X + wedgeR * Math.cos(angleReal);
  const ay1 = SUN_Y - wedgeR * Math.sin(angleReal);
  const ax2 = SUN_X + wedgeR * Math.cos(angleMean);
  const ay2 = SUN_Y - wedgeR * Math.sin(angleMean);

  // Determine sweep direction and arc flag
  let dAngle = angleMean - angleReal;
  // Normalize to (-π, π]
  while (dAngle >  Math.PI) dAngle -= 2 * Math.PI;
  while (dAngle < -Math.PI) dAngle += 2 * Math.PI;
  const largeArc = Math.abs(dAngle) > Math.PI ? 1 : 0;
  const sweep = dAngle > 0 ? 1 : 0;

  if (Math.abs(dAngle) > 0.002) {
    html += `<path d="M${SUN_X},${SUN_Y} L${ax1.toFixed(1)},${ay1.toFixed(1)}
      A${wedgeR},${wedgeR} 0 ${largeArc},${sweep} ${ax2.toFixed(1)},${ay2.toFixed(1)} Z"
      fill="white" opacity="0.07"/>`;
    // Arc outline
    html += `<path d="M${ax1.toFixed(1)},${ay1.toFixed(1)}
      A${wedgeR},${wedgeR} 0 ${largeArc},${sweep} ${ax2.toFixed(1)},${ay2.toFixed(1)}"
      fill="none" stroke="white" stroke-width="1" opacity="0.25"/>`;
  }

  // Line: Sun → mean Earth
  html += `<line x1="${SUN_X}" y1="${SUN_Y}" x2="${mp.x.toFixed(1)}" y2="${mp.y.toFixed(1)}"
    stroke="var(--mean-sun)" stroke-width="1.2" stroke-dasharray="5 3" opacity="0.5"/>`;

  // Line: Sun → real Earth
  html += `<line x1="${SUN_X}" y1="${SUN_Y}" x2="${ep.x.toFixed(1)}" y2="${ep.y.toFixed(1)}"
    stroke="var(--sun-gold)" stroke-width="1.2" opacity="0.5"/>`;

  // Mean Earth
  html += `<circle cx="${mp.x.toFixed(1)}" cy="${mp.y.toFixed(1)}" r="9"
    fill="none" stroke="var(--mean-sun)" stroke-width="2" stroke-dasharray="3 2" opacity="0.85"/>`;
  html += `<text x="${mp.x.toFixed(1)}" y="${(mp.y - 14).toFixed(1)}" text-anchor="middle"
    font-size="10" fill="var(--mean-sun)" font-family="var(--font-sans)" opacity="0.9">mean</text>`;

  // Real Earth
  html += `<circle cx="${ep.x.toFixed(1)}" cy="${ep.y.toFixed(1)}" r="11"
    fill="var(--earth-blue)" opacity="0.2"/>`;
  html += `<circle cx="${ep.x.toFixed(1)}" cy="${ep.y.toFixed(1)}" r="7"
    fill="var(--earth-blue)"/>`;
  html += `<text x="${ep.x.toFixed(1)}" y="${(ep.y + 20).toFixed(1)}" text-anchor="middle"
    font-size="10" fill="#7fb3d3" font-family="var(--font-sans)">Earth</text>`;

  document.getElementById('orbit-dyn').innerHTML = html;
}

// ── Update stats ──
function updateStats(D) {
  const eot = eotMinutes(D);
  const dist = earthSunAU(D) * 149.6;
  const absEot = Math.abs(eot);

  document.getElementById('stat-date').textContent = dayToStr(D);
  document.getElementById('day-label').textContent = dayToStr(D);

  if (absEot < 0.4) {
    document.getElementById('stat-gap').innerHTML = `<span class="same">Aligned</span>`;
    document.getElementById('stat-gap-desc').textContent = 'Both suns at the same position.';
  } else if (eot > 0) {
    document.getElementById('stat-gap').innerHTML =
      `<span class="ahead">${absEot.toFixed(1)} min ahead</span>`;
    document.getElementById('stat-gap-desc').textContent =
      `Real Sun has swept ${(absEot * 0.25).toFixed(1)}° more than the mean Sun — solar noon came early.`;
  } else {
    document.getElementById('stat-gap').innerHTML =
      `<span class="behind">${absEot.toFixed(1)} min behind</span>`;
    document.getElementById('stat-gap-desc').textContent =
      `Real Sun has swept ${(absEot * 0.25).toFixed(1)}° less than the mean Sun — solar noon will come late.`;
  }

  document.getElementById('stat-dist').textContent = dist.toFixed(1) + ' Mkm';
  const periDist = Math.min(Math.abs(D - 3), Math.abs(D - 3 + 365));
  if (periDist < 50) {
    document.getElementById('stat-dist-desc').textContent =
      'Near perihelion — Earth moves fastest, real Sun races ahead.';
  } else if (D > 155 && D < 205) {
    document.getElementById('stat-dist-desc').textContent =
      'Near aphelion — Earth moves slowest, real Sun falls behind.';
  } else {
    document.getElementById('stat-dist-desc').textContent =
      'Intermediate orbital speed.';
  }
}

// ── Initialize ──
drawOrbitBG();

const daySlider = document.getElementById('day-slider');

function update() {
  const D = parseInt(daySlider.value);
  updateOrbit(D);
  updateStats(D);
}

daySlider.addEventListener('input', update);
update();
</script>
</body>
</html>
